<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面时钟</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: #f8fafc;
        background-color: #0f0f23;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        user-select: none;
      }

      .container {
        width: 100%;
        max-width: 360px;
        padding: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      .time-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .time-display {
        font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
        font-size: 72px;
        font-weight: 700;
        color: #6366f1;
        text-shadow: 0 0 30px rgba(99, 102, 241, 0.5), 0 0 60px rgba(99, 102, 241, 0.3);
        letter-spacing: 2px;
        transition: text-shadow 0.3s ease;
      }

      .date-display {
        font-size: 16px;
        color: #94a3b8;
        letter-spacing: 1px;
      }

      .alarm-section {
        width: 100%;
        background: #1a1a3e;
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .alarm-header {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #22d3ee;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
      }

      .alarm-icon {
        width: 20px;
        height: 20px;
      }

      .alarm-input-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .alarm-input-row input {
        width: 70px;
        padding: 12px;
        font-size: 24px;
        font-family: 'JetBrains Mono', 'Consolas', monospace;
        text-align: center;
        background: #0f0f23;
        border: 2px solid #2a2a4a;
        border-radius: 8px;
        color: #f8fafc;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .alarm-input-row input:focus {
        border-color: #6366f1;
      }

      .alarm-input-row input::placeholder {
        color: #64748b;
      }

      .colon {
        font-size: 24px;
        font-family: 'JetBrains Mono', monospace;
        color: #64748b;
      }

      .alarm-buttons {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      .btn-primary {
        flex: 1;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }

      .btn-primary:hover {
        background: #5558e3;
        transform: scale(1.02);
      }

      .btn-outline {
        flex: 1;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        background: transparent;
        border: 2px solid;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-warning {
        color: #f59e0b;
        border-color: #f59e0b;
      }

      .btn-warning:hover {
        background: rgba(245, 158, 11, 0.1);
      }

      .alarm-indicator {
        width: 100%;
        background: linear-gradient(135deg, #1a1a3e, #2a1a4e);
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #6366f1;
        animation: pulse-border 2s infinite;
      }

      @keyframes pulse-border {
        0%, 100% {
          box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        50% {
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
        }
      }

      .indicator-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .indicator-time {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 28px;
        font-weight: 700;
        color: #22d3ee;
      }

      .pulse-dot {
        width: 10px;
        height: 10px;
        background: #22d3ee;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      .indicator-countdown {
        font-size: 14px;
        color: #94a3b8;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="time-section">
        <div class="time-display" id="time">00:00:00</div>
        <div class="date-display" id="date">2026年05月08日 星期五</div>
      </div>

      <div class="alarm-section">
        <div class="alarm-header">
          <svg class="alarm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span>闹钟</span>
        </div>

        <div class="alarm-input-row" id="alarmInputRow">
          <input type="number" id="alarmHour" min="0" max="23" placeholder="时" />
          <span class="colon">:</span>
          <input type="number" id="alarmMinute" min="0" max="59" placeholder="分" />
        </div>

        <div class="alarm-buttons">
          <button id="setAlarmBtn" class="btn-primary">设置闹钟</button>
          <button id="cancelAlarmBtn" class="btn-outline btn-warning" style="display: none;">取消闹钟</button>
        </div>
      </div>

      <div class="alarm-indicator" id="alarmIndicator" style="display: none;">
        <div class="indicator-content">
          <div class="indicator-time">
            <span class="pulse-dot"></span>
            <span id="alarmTimeDisplay">00:00</span>
          </div>
          <div class="indicator-countdown">
            剩余 <span id="countdownDisplay">00:00</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      const timeDisplay = document.getElementById('time');
      const dateDisplay = document.getElementById('date');
      const alarmHourInput = document.getElementById('alarmHour');
      const alarmMinuteInput = document.getElementById('alarmMinute');
      const setAlarmBtn = document.getElementById('setAlarmBtn');
      const cancelAlarmBtn = document.getElementById('cancelAlarmBtn');
      const alarmIndicator = document.getElementById('alarmIndicator');
      const alarmTimeDisplay = document.getElementById('alarmTimeDisplay');
      const countdownDisplay = document.getElementById('countdownDisplay');

      function formatTime(num) {
        return num.toString().padStart(2, '0');
      }

      // Listen for time updates from main process
      ipcRenderer.on('timeUpdate', (event, data) => {
        timeDisplay.textContent = data.time;
        dateDisplay.textContent = data.date;
      });

      // Listen for countdown updates
      ipcRenderer.on('countdown', (event, data) => {
        const minutes = Math.floor(data.remainingSeconds / 60);
        const seconds = data.remainingSeconds % 60;
        countdownDisplay.textContent = `${formatTime(minutes)}:${formatTime(seconds)}`;
        alarmTimeDisplay.textContent = data.alarmTime;
      });

      // Listen for alarm triggered
      ipcRenderer.on('alarmTriggered', () => {
        alarmIndicator.style.display = 'none';
        setAlarmBtn.style.display = 'block';
        cancelAlarmBtn.style.display = 'none';
      });

      function setAlarm() {
        const hour = parseInt(alarmHourInput.value);
        const minute = parseInt(alarmMinuteInput.value);

        if (isNaN(hour) || isNaN(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) {
          return;
        }

        ipcRenderer.send('setAlarm', { hour, minute });

        alarmTimeDisplay.textContent = `${formatTime(hour)}:${formatTime(minute)}`;
        alarmIndicator.style.display = 'block';
        setAlarmBtn.style.display = 'none';
        cancelAlarmBtn.style.display = 'block';

        alarmHourInput.value = '';
        alarmMinuteInput.value = '';
      }

      function cancelAlarm() {
        ipcRenderer.send('cancelAlarm');

        alarmIndicator.style.display = 'none';
        setAlarmBtn.style.display = 'block';
        cancelAlarmBtn.style.display = 'none';
      }

      setAlarmBtn.addEventListener('click', setAlarm);
      cancelAlarmBtn.addEventListener('click', cancelAlarm);

      alarmHourInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') setAlarm();
      });

      alarmMinuteInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') setAlarm();
      });

      alarmHourInput.addEventListener('input', () => {
        if (alarmHourInput.value.length > 2) {
          alarmHourInput.value = alarmHourInput.value.slice(0, 2);
        }
      });

      alarmMinuteInput.addEventListener('input', () => {
        if (alarmMinuteInput.value.length > 2) {
          alarmMinuteInput.value = alarmMinuteInput.value.slice(0, 2);
        }
      });
    </script>
  </body>
</html>
